<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="256" height="256" fill="#0a0e27" rx="64"/>
  
  <!-- Outer glow circle -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  
  <!-- Bat Symbol -->
  <g transform="translate(128, 128)">
    <!-- Left Wing -->
    <path d="M -30 -15 Q -60 -25 -75 -5 Q -80 5 -70 15 Q -55 25 -30 20 L -30 -15 Z" 
          fill="#1a1f3a" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Right Wing -->
    <path d="M 30 -15 Q 60 -25 75 -5 Q 80 5 70 15 Q 55 25 30 20 L 30 -15 Z" 
          fill="#1a1f3a" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="5" rx="12" ry="35" fill="#1a1f3a" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Head -->
    <circle cx="0" cy="-28" r="16" fill="#1a1f3a" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Left Ear -->
    <path d="M -8 -42 Q -12 -55 -6 -60 Q -2 -58 -6 -48 Z" 
          fill="#1a1f3a" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Right Ear -->
    <path d="M 8 -42 Q 12 -55 6 -60 Q 2 -58 6 -48 Z" 
          fill="#1a1f3a" stroke="#ffd700" stroke-width="1.5"/>
    
    <!-- Eyes (glowing) -->
    <circle cx="-4" cy="-30" r="2.5" fill="#ffd700"/>
    <circle cx="4" cy="-30" r="2.5" fill="#ffd700"/>
    
    <!-- Initials "AS" in body -->
    <text x="0" y="10" font-family="Courier New, monospace" font-size="20" font-weight="bold" 
          fill="#ffd700" text-anchor="middle" dominant-baseline="middle" letter-spacing="2">AS</text>
  </g>
  
  <!-- Corner code brackets (developer touch) -->
  <text x="16" y="24" font-family="Courier New, monospace" font-size="12" fill="#ffd700" opacity="0.6">&lt;</text>
  <text x="224" y="24" font-family="Courier New, monospace" font-size="12" fill="#ffd700" opacity="0.6">/&gt;</text>
  <text x="16" y="240" font-family="Courier New, monospace" font-size="12" fill="#ffd700" opacity="0.6">&lt; /</text>
  <text x="220" y="240" font-family="Courier New, monospace" font-size="12" fill="#ffd700" opacity="0.6">&gt;</text>
</svg>
